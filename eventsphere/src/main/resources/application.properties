server.port=8085
# MySQL Connection Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/eventspheredb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=MyStrongPass@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA Engine Adjustments
