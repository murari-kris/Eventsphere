<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — EventSphere</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<script src="js/app.js"></script>
<script>
  if (getUser()) window.location.href = 'dashboard.html'
  buildNavbar('')
</script>

<div id="toastBox"></div>

<div class="form-page" style="align-items:flex-start;padding-top:2rem;padding-bottom:2rem">
  <div class="form-glow"></div>
  <div class="form-card" style="max-width:520px">
    <div class="form-logo">Event<span>Sphere</span></div>
    <div class="form-sub">Create your student account — free forever</div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input class="form-input" id="rName" placeholder="Rahul Sharma" autocomplete="name"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input class="form-input" type="email" id="rEmail" placeholder="rahul@college.edu" autocomplete="email"/>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Password *</label>
        <input class="form-input" type="password" id="rPass" placeholder="min 6 chars" autocomplete="new-password"/>
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" id="rPhone" placeholder="9876543210" autocomplete="tel"/>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Branch</label>
        <select class="form-select" id="rBranch">
          <option value="">Select branch</option>
          <option>CSE</option><option>IT</option><option>ECE</option>
          <option>EEE</option><option>MECH</option><option>CIVIL</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Year</label>
        <select class="form-select" id="rYear">
          <option value="">Select year</option>
          <option>1st Year</option><option>2nd Year</option>
          <option>3rd Year</option><option>4th Year</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Skills <span style="color:var(--muted);font-size:.75rem">(for hackathon team matching)</span></label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px" id="skillChips">
        <button type="button" class="chip" onclick="toggleSkill(this,'FRONTEND')">Frontend</button>
        <button type="button" class="chip" onclick="toggleSkill(this,'BACKEND')">Backend</button>
        <button type="button" class="chip" onclick="toggleSkill(this,'ML')">ML / AI</button>
        <button type="button" class="chip" onclick="toggleSkill(this,'DESIGN')">UI/UX</button>
        <button type="button" class="chip" onclick="toggleSkill(this,'MOBILE')">Mobile</button>
        <button type="button" class="chip" onclick="toggleSkill(this,'DEVOPS')">DevOps</button>
      </div>
    </div>

    <div id="regErr" style="color:var(--red);font-size:.82rem;display:none;margin-bottom:.5rem"></div>
    <button class="btn-full" id="regBtn" onclick="doRegister()">Create Account</button>
    <div class="form-switch">Already have an account? <a href="/Login.html">Sign In</a></div>
  </div>
</div>

<script>
let selectedSkills = []

function toggleSkill(el, skill) {
  if (el.classList.contains('active')) {
    el.classList.remove('active')
    selectedSkills = selectedSkills.filter(s => s !== skill)
  } else {
    el.classList.add('active')
    selectedSkills.push(skill)
  }
}

async function doRegister() {
  const errEl = document.getElementById('regErr')
  const btn   = document.getElementById('regBtn')
  errEl.style.display = 'none'
  const name  = document.getElementById('rName').value.trim()
  const email = document.getElementById('rEmail').value.trim()
  const pass  = document.getElementById('rPass').value
  if (!name || !email || !pass) {
    errEl.textContent = 'Name, email and password are required'
    errEl.style.display = 'block'; return
  }
  if (pass.length < 6) {
    errEl.textContent = 'Password must be at least 6 characters'
    errEl.style.display = 'block'; return
  }
  btn.textContent = 'Creating account…'
  btn.disabled    = true
  try {
    const data = await POST('/auth/register', {
      name, email, password: pass,
      phone:  document.getElementById('rPhone').value,
      branch: document.getElementById('rBranch').value,
      year:   document.getElementById('rYear').value,
      skills: selectedSkills.join(',')
    })
    localStorage.setItem('token', data.accessToken)
    localStorage.setItem('user',  JSON.stringify(data))
    toast('Account created! Welcome to EventSphere 🎉', 'ok')
    setTimeout(() => { window.location.href = 'dashboard.html' }, 700)
  } catch(e) {
    errEl.textContent   = e.message || 'Registration failed'
    errEl.style.display = 'block'
  } finally {
    btn.textContent = 'Create Account'
    btn.disabled    = false
  }
}
</script>
</body>
</html>
