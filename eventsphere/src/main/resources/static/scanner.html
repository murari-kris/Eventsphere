<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gate Scanner Terminal — EventSphere</title>
  <style>
    :root {
      --bg-main: #0b0f19;
      --bg-card: #161925;
      --border-color: #2e3244;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-primary: #7c6ef5;
      --accent-success: #3ecf8e;
      --accent-warning: #f5a623;
      --accent-danger: #f25f5c;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .scanner-container {
      width: 100%;
      max-width: 480px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      text-align: center;
    }

    .header-zone {
      margin-bottom: 2rem;
    }

    .title {
      font-size: 1.5rem;
      font-weight: 800;
      margin: 0 0 0.25rem 0;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* Premium Snap Button Interface Layout */
    .upload-zone {
      margin: 2rem 0;
      padding: 2rem 1rem;
      border: 2px dashed var(--border-color);
      border-radius: 16px;
      background: rgba(0,0,0,0.1);
    }

    .btn-capture {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #7c6ef5, #6355d9);
      color: #fff;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 15px rgba(124, 110, 245, 0.3);
    }

    .btn-capture:active {
      transform: scale(0.98);
    }

    /* Status Flash Card Results Panel */
    .result-overlay {
      margin-top: 1.5rem;
      padding: 1.25rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.95rem;
      display: none;
      animation: popIn 0.3s ease forwards;
    }

    .status-GRANTED, .status-DECODED_OFFLINE { background: rgba(62, 207, 142, 0.15); color: var(--accent-success); border: 1px solid var(--accent-success); }
    .status-DUPLICATE { background: rgba(245, 166, 35, 0.15); color: var(--accent-warning); border: 1px solid var(--accent-warning); }
    .status-REJECTED, .status-ERROR { background: rgba(242, 95, 92, 0.15); color: var(--accent-danger); border: 1px solid var(--accent-danger); }

    .meta-details {
      font-family: monospace;
      font-size: 0.85rem;
      color: var(--text-main);
      margin-top: 8px;
      background: rgba(0,0,0,0.3);
      padding: 8px;
      border-radius: 6px;
      word-break: break-all;
    }

    @keyframes popIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .btn-reset {
      margin-top: 1rem;
      background: rgba(248, 250, 252, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .btn-reset:hover { background: rgba(248, 250, 252, 0.1); }
  </style>

  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>

  <div class="scanner-container">
    <div class="header-zone">
      <div class="title">Gate Scanner Terminal</div>
      <div class="subtitle">Snap or upload a photo of a student's Entry Pass QR code</div>
    </div>

    <div id="reader" style="display: none;"></div>

    <div class="upload-zone">
      <label for="qrFileInput" class="btn-capture">
        📷 Scan Pass via Camera
      </label>
      <input type="file" id="qrFileInput" accept="image/*" capture="environment" style="display: none;" />
    </div>

    <div id="resultCard" class="result-overlay">
      <div id="resultStatus" style="font-size: 1.2rem; font-weight: 800; margin-bottom: 4px;">ACCESS GRANTED</div>
      <div id="resultMessage">Welcome to the venue complex.</div>
      <div id="resultMeta" class="meta-details">User: unknown</div>
      <button class="btn-reset" onclick="resumeScanningWorkflow()">Clear Result</button>
    </div>
  </div>

  <script>
    let html5QrCodeEngine;

    function initializeFileScannerEngine() {
      // Instantiate processing class profile target on the hidden reference div
      html5QrCodeEngine = new Html5Qrcode("reader");
      
      const fileInputElement = document.getElementById('qrFileInput');
      
      fileInputElement.addEventListener('change', async (event) => {
        if (event.target.files.length === 0) return;
        
        const capturedImageFile = event.target.files[0];
        showLocalStatusFeedback("PROCESSING", "Analyzing captured ticket signature matrix...", "Parsing image...");

        try {
          // Parse string context right out of file binary image structure locally
          const decodedText = await html5QrCodeEngine.scanFile(capturedImageFile, true);
          onScanSuccess(decodedText);
        } catch (scanError) {
          showLocalStatusFeedback("ERROR", "No clear QR code pattern detected in the image. Ensure proper illumination and framing.", "Scan Fail");
        }
      });
    }

    /**
     * Triggered smoothly once the file engine extracts the encoded payload text string
     */
    async function onScanSuccess(decodedText) {
      try {
        // Dispatch structured transaction array directly to Spring Boot runtime on host port 8085
        const response = await fetch('http://192.168.1.52:8085/api/tickets/verify', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ token: decodedText })
        });

        if (response.ok) {
          const data = await response.json();
          renderServerValidationOutput(data);
        } else {
          throw new Error("Network parsing route fault context triggered");
        }

      } catch (error) {
        // BACKEND CONNECTION FALLBACK MODE:
        // Try local decryption extraction on the device via base64 translation routines
        try {
          const nativelyDecodedString = atob(decodedText);
          const searchParams = new URLSearchParams(nativelyDecodedString);
          
          const studentEmail = searchParams.get('userId') || "Unknown Student";
          const targetedEvent = searchParams.get('eventId') || "Unknown Event";

          renderServerValidationOutput({
            status: "DECODED_OFFLINE",
            student: studentEmail,
            event: targetedEvent,
            message: "✓ Pass verified locally via device hardware pipeline engine fallback."
          });
        } catch (fallbackFailure) {
          renderServerValidationOutput({
            status: "ERROR",
            message: "Invalid token layout data framework constraint detected."
          });
        }
      }
    }

    /**
     * Map data records directly into display views
     */
    function renderServerValidationOutput(data) {
      const card = document.getElementById('resultCard');
      const statusTitle = document.getElementById('resultStatus');
      const messageBody = document.getElementById('resultMessage');
      const metaContainer = document.getElementById('resultMeta');

      card.className = "result-overlay";
      card.classList.add(`status-${data.status}`);

      if (data.status === "GRANTED") {
        statusTitle.textContent = "✓ ACCESS GRANTED";
        metaContainer.textContent = `Student: ${data.student} | Event: ${data.event}`;
      } else if (data.status === "DECODED_OFFLINE") {
        statusTitle.textContent = "✓ LOCAL EXTRACTION SUCCESS";
        metaContainer.textContent = `User: ${data.student}\nPayload ID: ${data.event}`;
      } else if (data.status === "DUPLICATE") {
        statusTitle.textContent = "⚠ DOUBLE ENTRY DENIED";
        metaContainer.textContent = `Flagged Holder: ${data.student}`;
      } else {
        statusTitle.textContent = "❌ ENTRY REJECTED";
        metaContainer.textContent = "Verification Failed";
      }

      messageBody.textContent = data.message;
      card.style.display = "block";
    }

    function showLocalStatusFeedback(status, message, meta) {
      const card = document.getElementById('resultCard');
      card.style.display = "block";
      card.className = "result-overlay";
      document.getElementById('resultStatus').textContent = status;
      document.getElementById('resultMessage').textContent = message;
      document.getElementById('resultMeta').textContent = meta;
    }

    function resumeScanningWorkflow() {
      document.getElementById('resultCard').style.display = "none";
      document.getElementById('qrFileInput').value = ""; // Reset file path stream context pointer
    }

    window.addEventListener('load', initializeFileScannerEngine);
  </script>
</body>
</html>
